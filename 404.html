<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <title>Redirecting to Post...</title>
    <meta name="robots" content="noindex, follow">
    
    <script>
        // 1. تعريف المجلدات العميقة التي تظهر في الصورة
        // أضف أي مجلد جديد تفتحه هنا
        const baseFolders = [
            'jhm/afi', 
            'qmb/jxz'
        ];

        // 2. أسماء الملفات التي يتم إنشاؤها داخل تلك المجلدات
        // يمكنك وضع أسماء المقالات التي تم توليدها
        const articleFiles = [
            'post1', 'post2', 'article-2026', 'tech-news'
            // أضف قائمة بأسماء الملفات (بدون .html)
        ];

        function getSmartRedirect() {
            // اختيار مسار مجلد عشوائي من القائمة
            const folder = baseFolders[Math.floor(Math.random() * baseFolders.length)];
            
            // اختيار ملف عشوائي
            const file = articleFiles[Math.floor(Math.random() * articleFiles.length)];

            // بناء الرابط النهائي
            // النتيجة ستكون مثلاً: /jhm/afi/post1.html
            return `/${folder}/${file}.html`;
        }

        function doRedirect() {
            const target = getSmartRedirect();
            console.log("Redirecting to: " + target);
            window.location.href = target;
        }

        window.onload = doRedirect;
    </script>
</head>
<body>
    <div style="text-align: center; margin-top: 20%; font-family: sans-serif;">
        <p>جاري تحويلك إلى صفحة ذات صلة...</p>
        <img src="https://i.gifer.com/ZZ5H.gif" width="50"> </div>
</body>
</html>
