<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Redirecting...</title>
    <meta name="robots" content="noindex, follow">
    
    <script>
        // 1. قائمة المجلدات التي تحتوي على منشوراتك (عدل الأسماء هنا)
        const folders = ['posts', 'articles', 'blog', 'news', 'archive'];

        // 2. قائمة بأسماء الملفات (يفضل أن تكون قائمة كبيرة لزيادة التنوع)
        // إذا كانت أسماء ملفاتك تتبع نمطاً معيناً، يمكنك إضافتها هنا
        const pages = [
            'tech-donations-2026',
            'software-guide-nonprofit',
            'digital-transformation-tips',
            'it-security-best-practices',
            'fundraising-templates-v1',
            'how-to-apply-for-grants'
            // أضف المزيد من الأسماء هنا بدون .html
        ];

        function redirectToRandomPage() {
            // اختيار مجلد عشوائي
            const randomFolder = folders[Math.floor(Math.random() * folders.length)];
            // اختيار صفحة عشوائية
            const randomPage = pages[Math.floor(Math.random() * pages.length)];
            
            // بناء الرابط النهائي
            // سيصبح الشكل مثلاً: /posts/tech-donations-2026.html
            const finalUrl = "/" + randomFolder + "/" + randomPage + ".html";

            // التوجيه التلقائي
            window.location.href = finalUrl;
        }

        // تنفيذ التوجيه بمجرد تحميل الصفحة
        window.onload = redirectToRandomPage;
    </script>
</head>
<body>
    <p>Loading requested resource... If you are not redirected, <a href="/">click here</a>.</p>
</body>
</html>
